# base16-santi — Santiago's original Base16 default-dark palette (the hex
# values that lived in ~/.config/tmux/base16.sh), ported to the Omarchy-style
# theme mechanism. Standard base16 -> ANSI-16 mapping:
#   0=base00 1=base08 2=base0B 3=base0A 4=base0D 5=base0E 6=base0C 7=base05
#   8=base03 9..14=bright copies of 1..6 15=base07
background = #151515
foreground = #D0D0D0
cursor-color = #D0D0D0
selection-background = #202020
selection-foreground = #E0E0E0

palette = 0=#151515
palette = 1=#AC4142
palette = 2=#90A959
palette = 3=#F4BF75
palette = 4=#6A9FB5
palette = 5=#AA759F
palette = 6=#75B5AA
palette = 7=#D0D0D0
palette = 8=#909090
palette = 9=#AC4142
palette = 10=#90A959
palette = 11=#F4BF75
palette = 12=#6A9FB5
palette = 13=#AA759F
palette = 14=#75B5AA
palette = 15=#F5F5F5
