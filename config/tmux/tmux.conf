# Set 'C-Space' as the prefix key instead of 'C-b'
set -g prefix 'C-Space'
unbind-key C-b
bind 'C-Space' send-prefix

# Second prefix: Ghostty sends it for the Cmd shortcuts (you never type it yourself).
# M-q is free in bash, so the Cmd+... shortcuts go through the normal prefix table.
set -g prefix2 M-q

# When the current session is destroyed, switch to another (most recent) session
# instead of exiting to the shell. If it's the last session, then it does exit (correct).
set -g detach-on-destroy off

# clear screen with 'prefix+C+l' since 'C+l is managed by vim-tmux-navigator
bind C-l send-keys 'C-l'

# general
set-option -g default-terminal "tmux-256color"
# Truecolor (RGB) + OSC 8 hyperlinks for any outer terminal (Ghostty supports both)
set -as terminal-features ",*:RGB:hyperlinks"
set -s escape-time 0
set -g base-index 1
setw -g pane-base-index 1
set -g history-limit 50000
setw -g mouse on
set -g renumber-windows on
set -g status-position top

setw -g mode-keys vi
# prefer emacs key bindings over vi bindings in the tmux command prompt
set -g status-keys emacs

# more settings to make copy-mode more vim-like
unbind [
bind Space copy-mode
unbind p
bind p paste-buffer
bind -T copy-mode-vi v send -X begin-selection

# Start copy mode upon PageUp
bind -n PPage if-shell -F "#{alternate_on}" "send-keys PPage" "copy-mode -e; send-keys PPage"

# Allow C-left and C-right word navigation
setw -g xterm-keys on

# === macOS notifications when a background window "rings the bell" ===
# Claude Code with preferredNotifChannel=terminal_bell rings the bell when it finishes.
setw -g monitor-bell on
set -g bell-action any        # always alert (even if you switched to another macOS app)
set -g visual-bell off
set -g window-status-bell-style default

# Window name = Claude's conversation topic. Claude Code publishes the topic in the
# pane title; as soon as it changes, rename the window after it. The script only acts
# on panes running Claude and never overrides a window you renamed yourself (Cmd+R).
set-hook -g pane-title-changed 'run-shell -b "~/.config/tmux/rename-to-topic.sh \"#{hook_pane}\""'

# Recommended by Claude Code for tmux (notification passthrough + Shift+Enter)
set -g allow-passthrough on

# Refresh these on attach so tools inside tmux (yazi, kitten icat, fzf preview)
# can detect the REAL outer terminal and use the Kitty graphics protocol
# (recommended by yazi's image-preview docs).
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'
# Forward focus events to apps (Claude/vim know when they are unfocused).
set -g focus-events on
# Track whether Ghostty is focused, so Claude's Stop hook knows if you're looking
# at it (don't disturb) or not (notify). Starts assuming focused.
set -g @ghostty_focused 1
set-hook -g client-focus-out 'run-shell -b "tmux set -g @ghostty_focused 0"'

# Pane navigation
bind -r C-j select-window -t :-
bind -r C-k select-window -t :+

# Windows prev/next via 2nd prefix (Ghostty cmd+shift+[ / cmd+shift+])
bind -r [ previous-window
bind -r ] next-window

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# split window
bind "\\" split-window -h -c "#{pane_current_path}"
bind "|" split-window -fh -c "#{pane_current_path}"
bind "-" split-window -v -c "#{pane_current_path}"
bind "_" split-window -fv -c "#{pane_current_path}"

# opencode in a 30%-wide right pane, in the current pane's directory (Ghostty cmd+o)
bind o split-window -h -l 30% -c "#{pane_current_path}" "~/.opencode/bin/opencode"

# easy switch to last session
bind j switch-client -l

# keep CWD when opening new window
unbind c
bind c new-window -c "#{pane_current_path}"

# new session (Ghostty cmd+n)
bind N new-session

# new session PROMPTING for a name (Ghostty cmd+shift+n)
bind M command-prompt -p "session name:" "new-session -s '%%'"
bind x confirm-before -y -p "kill pane #P? (Enter=yes, n=no)" kill-pane
bind '&' confirm-before -y -p "kill window '#W'? (Enter=yes, n=no)" kill-window
bind X confirm-before -y -p "kill session '#S'? (Enter=yes, n=no)" kill-session

# search the scrollback: copy-mode + reverse-search prompt (Ghostty cmd+f)
bind F copy-mode \; send-keys ?

# jump to the last window/session that alerted (Ghostty cmd+shift+u -> prefix+B,
# because TPM already uses prefix+U for 'update plugins' and was overriding it)
bind B run-shell "~/.config/tmux/goto-last-bell.sh"

# Only marks focus (no auto-jump: it ran without a client context and cleared the
# marker without jumping). To return to the window that alerted, use Cmd+Shift+U.
set-hook -g client-focus-in 'run-shell -b "tmux set -g @ghostty_focused 1"'

# toggle the status bar
bind e if -F '#{==:#{status},off}' 'set status on' 'set status off'

# others
bind r source-file ~/.config/tmux/tmux.conf \; display "Config Reloaded!"
bind k run-shell "tmux neww k9s"
bind m run-shell "tmux neww ~/.local/bin/cmatrix-tmux"
bind i split-window -h -c "#{pane_current_path}" "opencode"
bind g display-popup -w "90%" -h "90%" -d "#{pane_current_path}" -E "lazygit"

# Theme picker (Ghostty + tmux at once, fzf). Overrides tmux's default
# prefix+t (clock-mode); remove this line to get the clock back.
bind t display-popup -w "70%" -h "70%" -E "~/.local/bin/theme-switcher"

# New window SSHing into the home Linux box (Ghostty cmd+shift+l)
bind G new-window -n santi-linux "ssh-santi-linux"

# We have this at ghostty (terminal) level, but in tmux it works better defining it again
bind -n C-f display-popup -w "90%" -h "90%" -d "#{pane_current_path}" -E "~/.local/bin/tmux-sessionizer"

# Like the sessionizer, but opens the picked dir in a NEW WINDOW (Ghostty cmd+shift+t)
bind T display-popup -w "90%" -h "90%" -d "#{pane_current_path}" -E "~/.local/bin/tmux-windowizer"

# Theme
source ~/.config/tmux/base16.sh

# Plugins using tpm
set -g @plugin 'tmux-plugins/tmux-copycat'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'jonmosco/kube-tmux'

# https://github.com/tmux-plugins/tpm/issues/105
setenv -g TMUX_PLUGIN_MANAGER_PATH "~/.config/tmux/plugins"
if "test ! -d ~/.config/tmux/plugins/tpm" {
   run "git clone https://github.com/tmux-plugins/tpm ~/.config/tmux/plugins/tpm"
   run "~/.config/tmux/plugins/tpm/bin/install_plugins"
   # TODO: Remove the following specific commit hash once it's fixed upstream
   run "cd ~/.config/tmux/plugins/vim-tmux-navigator && git co 1cfd6ec"
}
run -b "~/.config/tmux/plugins/tpm/tpm"
